_:
  pretty_name: 'BRIGHT (benchmark suite)'
  desc: '
<p>
BRIGHT is a retrieval benchmark in which finding relevant documents requires reasoning rather
than surface-level lexical or semantic matching. It spans 12 diverse domains drawn from sources
such as StackExchange, coding problems (LeetCode), and math competitions (AoPS, TheoremQA).
</p>
<p>
Each domain is available as a separate subset. The base subsets use short documents; the
<kbd>-long</kbd> subsets provide the original long-form documents with relevance judgments
mapped accordingly. Queries include the original reasoning rationale, gold answer, and
LLM-generated reasoning fields (from Gemini, Claude 3 Opus, GPT-4, GRIT, and Llama3-70B).
</p>
<ul>
<li>Documents: Domain-specific passages (web posts, documentation, problems, etc.)</li>
<li>Queries: Reasoning-intensive natural language questions</li>
<li><a href="https://arxiv.org/abs/2407.12883">Dataset Paper</a></li>
<li><a href="https://github.com/HKUNLP/BRIGHT">GitHub</a></li>
<li><a href="https://brightbenchmark.github.io/">Website</a></li>
</ul>
'
  bibtex_ids: ['DBLP:conf/iclr/SuYXSMWLSST0YA025']

